[phases.setup]
nixPkgs = ["nodejs-20_x"]

[phases.install]
env = {
  NPM_CONFIG_PRODUCTION = "false",
  NPM_CONFIG_FETCH_TIMEOUT = "900000",
  NPM_CONFIG_FETCH_RETRIES = "15",
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT = "60000",
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT = "300000",
  NPM_CONFIG_MAXSOCKETS = "2"
}
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"

